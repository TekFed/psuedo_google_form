<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pseudo Google Forms - Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SurveyJS Creator -->
    <link
      href="https://unpkg.com/survey-core/survey-core.min.css"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/survey-core/survey.core.min.js"></script>
    <script src="https://unpkg.com/survey-js-ui/survey-js-ui.min.js"></script>
    <link
      href="https://unpkg.com/survey-creator-core/survey-creator-core.min.css"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/survey-creator-core/survey-creator-core.min.js"></script>
    <script src="https://unpkg.com/survey-creator-js/survey-creator-js.min.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-gray-50">
    <div class="max-w-7xl mx-auto p-6">
      <div class="flex justify-between items-center mb-8">
        <h1 class="text-4xl font-bold text-indigo-600">
          📋 Pseudo Google Forms
        </h1>
        <div class="flex gap-4">
          <button
            onclick="showMyForms()"
            class="px-6 py-2 bg-white border border-gray-300 rounded-lg hover:bg-gray-100"
          >
            My Forms
          </button>
          <button
            onclick="newForm()"
            class="px-6 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700"
          >
            New Form
          </button>
        </div>
      </div>

      <!-- Title input -->
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1"
          >Form Title</label
        >
        <input
          id="formTitle"
          type="text"
          class="w-full max-w-md px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-indigo-500"
          placeholder="Untitled Form"
        />
      </div>

      <!-- Survey Creator -->
      <div
        id="surveyCreatorContainer"
        class="border border-gray-200 rounded-xl overflow-hidden shadow-sm"
        style="height: 700px"
      ></div>

      <div class="mt-4 text-center text-sm text-gray-500">
        Click the <strong>Save Survey</strong> button in the toolbar to save to
        backend
      </div>
    </div>

    <!-- My Forms Modal -->
    <div
      id="myFormsModal"
      class="hidden fixed inset-0 bg-black/50 flex items-center justify-center"
    >
      <div
        class="bg-white rounded-2xl w-full max-w-3xl max-h-[90vh] overflow-hidden"
      >
        <div class="p-6 border-b flex justify-between">
          <h2 class="text-2xl font-semibold">My Forms</h2>
          <button onclick="hideMyForms()" class="text-3xl leading-none">
            ×
          </button>
        </div>
        <div id="formsList" class="p-6 overflow-auto max-h-[70vh]"></div>
      </div>
    </div>

    <script>
      // Tailwind script run
      tailwind.config = { content: ["*"] };

      let creator;
      let currentFormId = null;
      const API_BASE = "http://127.0.0.1:8000/api";

      // Init Creator
      function initCreator() {
        const options = { showLogicTab: true, isAutoSave: false };
        creator = new SurveyCreator.SurveyCreator(options);

        creator.saveSurveyFunc = async (saveNo, callback) => {
          const title =
            document.getElementById("formTitle").value.trim() ||
            "Untitled Form";
          const surveyJson = creator.JSON;

          const url = currentFormId
            ? `${API_BASE}/forms/${currentFormId}`
            : `${API_BASE}/forms`;
          const method = currentFormId ? "PUT" : "POST";

          try {
            const res = await fetch(url, {
              method: method,
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ title, form_json: surveyJson }),
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || "Save failed");

            currentFormId = data.id;
            alert(
              `✅ Form saved! ID: ${data.id}\n\nFill it at: fill.html?id=${data.id}`,
            );
            callback(saveNo, true);
          } catch (err) {
            alert("❌ Save failed: " + err.message);
            callback(saveNo, false);
          }
        };

        creator.render("surveyCreatorContainer");
      }

      // Load form for editing
      async function loadFormForEdit(id) {
        currentFormId = parseInt(id);
        try {
          const res = await fetch(`${API_BASE}/forms/${id}`);
          const data = await res.json();
          document.getElementById("formTitle").value = data.title;
          creator.JSON = data.form_json;
        } catch (e) {
          alert("Failed to load form for editing");
        }
      }

      // Show My Forms
      async function showMyForms() {
        const modal = document.getElementById("myFormsModal");
        const list = document.getElementById("formsList");
        list.innerHTML = "<p class='text-center py-8'>Loading...</p>";
        modal.classList.remove("hidden");

        try {
          const res = await fetch(`${API_BASE}/forms`);
          const forms = await res.json();

          let html = `<div class="grid grid-cols-1 gap-4">`;
          forms.forEach((f) => {
            html += `
                <div class="border rounded-xl p-5 flex justify-between items-center hover:shadow-md transition">
                    <div>
                        <h3 class="font-semibold">${f.title}</h3>
                        <p class="text-xs text-gray-500">ID: ${f.id} • ${new Date(f.created_at).toLocaleDateString()}</p>
                    </div>
                    <div class="flex gap-2">
                        <a href="index.html?id=${f.id}" 
                           class="px-4 py-2 text-sm bg-blue-100 text-blue-700 rounded-lg hover:bg-blue-200">Edit</a>
                        <a href="fill.html?id=${f.id}" target="_blank" 
                           class="px-4 py-2 text-sm bg-green-100 text-green-700 rounded-lg hover:bg-green-200">Fill</a>
                        <a href="results.html?id=${f.id}" target="_blank" 
                           class="px-4 py-2 text-sm bg-purple-100 text-purple-700 rounded-lg hover:bg-purple-200">Results</a>
                    </div>
                </div>`;
          });
          html += `</div>`;
          list.innerHTML = forms.length
            ? html
            : "<p class='text-center py-12 text-gray-400'>No forms yet. Create one!</p>";
        } catch (e) {
          list.innerHTML =
            "<p class='text-red-500 text-center'>Failed to load forms</p>";
        }
      }

      function hideMyForms() {
        document.getElementById("myFormsModal").classList.add("hidden");
      }

      function newForm() {
        currentFormId = null;
        document.getElementById("formTitle").value = "";
        if (creator)
          creator.JSON = { pages: [{ name: "page1", elements: [] }] };
        hideMyForms();
      }

      // Init on load
      window.onload = () => {
        initCreator();

        // Check URL for edit mode
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");
        if (id) {
          loadFormForEdit(id);
        } else {
          // default empty survey
          creator.JSON = { pages: [{ name: "page1", elements: [] }] };
        }
      };
    </script>
  </body>
</html>
